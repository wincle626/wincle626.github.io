<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.5">
<title>UltraScale+ MPSoC Performance Explorer</title>

<style>
body {
 font-family: Arial;
 background:#0f172a;
 color:#e2e8f0;
 display:flex;
 gap:20px;
 padding:20px;
}
#container { display:flex;}

#ps { width:480px; border-right:3px solid #334155;}

.ps-section {
 display:grid;
 grid-template-columns: repeat(2,1fr);
 gap:12px;
 padding:10px;
}

.core-block {
 background:rgba(244,63,94,0.2);
 border:1px solid #f43f5e;
 border-radius:6px;
 padding:6px;
 text-align:center;
 cursor:pointer;
 font-size:12px;
}

.cache-row{
 display:flex;
 gap:4px;
 justify-content:center;
 margin-top:4px;
}

.cache{
 font-size:9px;
 padding:2px 4px;
 border-radius:3px;
 background:rgba(255,255,255,0.1);
}

.l2 {
 margin:10px;
 padding:10px;
 border:2px solid #f97316;
 text-align:center;
 border-radius:6px;
 cursor:pointer;
}

.axi-area {
 position:relative;
 height:300px;
}

.axi-core {
 position:absolute;
 left:170px;
 top:20px;
 width:140px;
 height:70px;
 border:2px solid #38bdf8;
 border-radius:8px;
 background:rgba(56,189,248,0.1);
 text-align:center;
 line-height:70px;
 cursor:pointer;
}

.node {
 position:absolute;
 width:130px;
 padding:8px;
 border-radius:6px;
 background:rgba(255,255,255,0.05);
 border:1px solid #94a3b8;
 text-align:center;
 cursor:pointer;
 font-size:11px;
}

#ddr { left:10px; top:130px;}
#periph { right:10px; top:130px;}

#gp { left:10px; bottom:10px;}
#hp { left:175px; bottom:10px;}
#hpc { right:10px; bottom:10px;}

.line { position:absolute; background:#38bdf8;}
.v { width:2px;}
.h { height:2px;}

#pl { position:relative;}

#grid {
 display:grid;
 grid-template-columns: repeat(8,45px);
 gap:15px;
}

#routes {
 position:absolute;
 width:520px;height:520px;
 pointer-events:none;
}

.tile {
 width:45px;
 height:45px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:6px;
 border:1px solid rgba(255,255,255,0.2);
 background:rgba(255,255,255,0.05);
 cursor:pointer;
 font-size:8px;
}

.clb{box-shadow: inset 0 0 6px #3b82f6;}
.dsp{box-shadow: inset 0 0 6px #ec4899;}
.bram{box-shadow: inset 0 0 6px #f59e0b;}
.uram{box-shadow: inset 0 0 6px #7c3aed;}
.clock{box-shadow: inset 0 0 6px #22d3ee;}
.iob{box-shadow: inset 0 0 6px #10b981;}

#info {
 width:430px;
 background:#020617;
 padding:15px;
 border-radius:8px;
 overflow:auto;
 max-height:90vh;
}
</style>
</head>

<body>

<div id="container">

<!-- ===== PS ===== -->
<div id="ps">

<div class="ps-section">
<div class="core-block" data-type="CORE">Core0<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
<div class="core-block" data-type="CORE">Core1<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
<div class="core-block" data-type="CORE">Core2<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
<div class="core-block" data-type="CORE">Core3<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
</div>

<div class="l2" data-type="L2">L2 Cache + SCU</div>

<div class="axi-area">
<div class="axi-core" data-type="AXI">AXI Interconnect</div>

<div id="ddr" class="node" data-type="DDR">DDR</div>
<div id="periph" class="node" data-type="PERIPH">Peripherals</div>
<div id="gp" class="node" data-type="GP">AXI-GP</div>
<div id="hp" class="node" data-type="HP">AXI-HP</div>
<div id="hpc" class="node" data-type="HPC">AXI-HPC</div>

<!-- wiring -->
<div class="line v" style="left:240px; top:-30px; height:50px;"></div>
<div class="line h" style="left:60px; top:95px; width:360px;"></div>
<div class="line v" style="left:60px; top:95px; height:170px;"></div>
<div class="line v" style="left:240px; top:95px; height:170px;"></div>
<div class="line v" style="left:420px; top:95px; height:170px;"></div>

</div>
</div>

<!-- ===== PL ===== -->
<div id="pl">
<svg id="routes"></svg>
<div id="grid"></div>
</div>

</div>

<div id="info">Click component</div>

<script>
const info=document.getElementById("info");

/* ===== FULL TECH + PERFORMANCE ===== */
function desc(type){
switch(type){
case "CORE":
return `
<h2>Cortex-A53 (APU Core)</h2>
<ul>
  <li><b>Role:</b> 64-bit application processor (Linux/RTOS user space, rich OS workloads) within the Zynq UltraScale+ MPSoC Processing System (PS).</li>
  <li><b>ISA / features:</b> Armv8‑A, TrustZone, NEON Advanced SIMD and single/double precision FPU.</li>
  <li><b>L1 caches (per core):</b> 32KB instruction cache (2‑way, parity) + 32KB data cache (4‑way, ECC).</li>
  <li><b>Coherency support:</b> Extendable cache coherency (ACE/ACP/CCI infrastructure) for multi-master systems.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Max core frequency:</b> up to 1.5 GHz (device/grade dependent).</li>
  <li><b>What dominates runtime:</b> memory hierarchy + coherency traffic; keep hot code/data in L1/L2 and avoid unnecessary cache maintenance.</li>
  <li><b>When to offload:</b> move streaming/parallel kernels to PL (DSP/BRAM/URAM) and communicate via HP/HPC ports depending on coherency needs.</li>
</ul>`;

case "L2":
return `
<h2>Shared L2 Cache (APU Cluster) + Coherency</h2>
<ul>
  <li><b>Role:</b> Shared last-level cache for the Cortex‑A53 cluster, reducing DDR traffic and smoothing contention across cores.</li>
  <li><b>Integrity:</b> L2 cache includes ECC; coherency is supported through the MPSoC coherency interconnect (ACE/ACP/CCI infrastructure).</li>
  <li><b>Software impact:</b> cacheability and shareability attributes (MMU) strongly affect performance and coherency behavior for PS↔PL data sharing.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Size:</b> 1MB, 16‑way set associative, shared across the CPUs.</li>
  <li><b>Optimization tips:</b> use huge pages/contiguous buffers for DMA, and choose HPC (coherent) vs HP (non‑coherent) carefully to reduce cache flush/invalidate overhead.</li>
</ul>`;

case "AXI":
return `
<h2>PS AXI Interconnect (Simplified View)</h2>
<ul>
  <li><b>Role:</b> Connects PS masters (APU/RPU/DMAs/peripherals) and PS↔PL AXI interfaces to DDR and on-chip services.</li>
  <li><b>Protocol:</b> AMBA AXI4 (bursts, multiple outstanding IDs), typically with clock-domain crossings and QoS/arbitration.</li>
  <li><b>System behavior:</b> bandwidth is shared—contention from APU/RPU, PL ports (HP/HPC), and other PS masters impacts latency and throughput.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Throughput limiters:</b> arbitration/QoS settings, DDR efficiency (bursts, row hits), and overlap of reads/writes.</li>
  <li><b>Practical guidance:</b> keep transactions bursty and aligned; profile with Vitis System Performance Analysis when available.</li>
</ul>`;

case "DDR":
return `
<h2>PS DDR Memory Controller</h2>
<ul>
  <li><b>Role:</b> Primary external memory interface for the PS and PL (via HP/HPC) — the most contended shared resource in many designs.</li>
  <li><b>Supported memories:</b> PS DDR can be configured for DDR4 and LPDDR4 (device/board dependent) via the PS configuration wizard.</li>
  <li><b>Design reality:</b> achieved bandwidth depends on access patterns, outstanding requests, and contention from multiple masters.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Max PS DDR4 data rate:</b> up to 2400 Mb/s (PS DDR controller limit; may be derated by topology/ranks).</li>
  <li><b>Theoretical peak bandwidth:</b> DDR data rate × bus width (bytes). Example: 2400 MT/s × 64-bit (8B) ≈ 19.2 GB/s (before efficiency losses).</li>
  <li><b>Latency sensitivity:</b> random small accesses suffer; prefer larger bursts, locality, and buffering (BRAM/URAM) when possible.</li>
</ul>`;

case "PERIPH":
return `
<h2>PS Peripherals (I/O Subsystem)</h2>
<ul>
  <li><b>Role:</b> Integrated controllers (UART, SPI, I2C, SD/eMMC, USB, Ethernet, GPIO, timers, etc.) connected via PS interconnect and MIO/EMIO pins.</li>
  <li><b>Clocking:</b> Peripheral clocks are generated from PS PLLs and can be gated/scaled for power/performance trade-offs.</li>
  <li><b>Integration tip:</b> route high-speed datapaths through DMA to DDR/OCM; keep register-level control on lightweight buses.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Design focus:</b> driver efficiency, interrupt moderation, and DMA/buffer sizing usually matter more than raw bus width.</li>
</ul>`;

case "GP":
return `
<h2>AXI GP (General‑Purpose PS↔PL Interface)</h2>
<ul>
  <li><b>Role:</b> Commonly used for <b>control/status</b> traffic between PS software and PL peripherals (register reads/writes, configuration, low‑rate messaging).</li>
  <li><b>Typical mapping:</b> PS accesses PL‑mapped address space; many designs pair this with AXI4‑Lite peripherals for simple register banks.</li>
  <li><b>Design tip:</b> keep GP for “control plane” and move bulk data to HP/HPC to avoid congesting software-visible transactions.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Best for:</b> short, infrequent accesses; not intended for sustained bulk streaming into DDR.</li>
  <li><b>Latency drivers:</b> interconnect arbitration + clock-domain crossings + software overhead (especially in Linux).</li>
</ul>`;

case "HP":
return `
<h2>AXI HP (High‑Performance, Non‑Coherent PL→PS)</h2>
<ul>
  <li><b>Role:</b> High‑bandwidth PL master access to PS memory system (typically DDR) for DMA/streaming workloads <b>without cache snooping</b>.</li>
  <li><b>When to use:</b> PL engines that move large buffers to/from DDR where software can manage cache maintenance explicitly.</li>
  <li><b>Shared resource:</b> the DDR controller is shared by APU/RPU/HP/ACP/HPC and other masters—contention affects all ports.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Throughput planning:</b> estimate an upper bound from DDR peak bandwidth; measured throughput depends on burst length, access pattern, and arbitration.</li>
  <li><b>Software implication:</b> you usually need cache flush/invalidate around DMA buffers to maintain correctness when the APU caches are enabled.</li>
</ul>`;

case "HPC":
return `
<h2>AXI HPC (High‑Performance, Cache‑Coherent PL→PS)</h2>
<ul>
  <li><b>Role:</b> Enables <b>I/O coherency</b>: PL masters can <b>snoop the APU caches</b> through the coherency interconnect for coherent transfers.</li>
  <li><b>Why it matters:</b> reduces or eliminates explicit cache maintenance in software for shared DDR buffers (when configured correctly).</li>
  <li><b>Important setup:</b> PL master must drive <code>AxCACHE</code>/<code>AxPROT</code> appropriately; memory region attributes (e.g., outer shareable) and CCI snooping must be enabled.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Recommendation:</b> HPC0/HPC1 are often preferred over ACP because they offer higher bandwidth and avoid disturbing the processor L2 cache contents.</li>
  <li><b>Trade‑offs:</b> coherency traffic can increase interconnect activity; still subject to DDR contention like HP ports.</li>
</ul>`;

case "CLB":
return `
<h2>CLB (Configurable Logic Block)</h2>
<ul>
  <li><b>Role:</b> Main programmable fabric for control logic, datapaths, and glue logic in the PL.</li>
  <li><b>Contents:</b> slices provide LUTs, storage elements (flip‑flops), multiplexers, and dedicated carry logic; SLICEM variants also support distributed RAM and shift registers.</li>
  <li><b>Design tip:</b> use carry chains for adders/counters, and LUTRAM/SRLs for small/fast buffers; push big memories to BRAM/URAM.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Critical path drivers:</b> LUT levels + routing; floorplanning and pipelining often beat “micro-optimizing” Boolean equations.</li>
  <li><b>Clocking:</b> keep fanout manageable with BUFG/BUFCE_LEAF and register replication when needed.</li>
</ul>`;

case "DSP":
return `
<h2>DSP48E2 (DSP Slice)</h2>
<ul>
  <li><b>Role:</b> Hard arithmetic block for high‑speed multiply‑accumulate, filtering, control, and ML kernels.</li>
  <li><b>Capabilities:</b> implements multiplication, add/subtract/accumulate, shifts, logic operations and pattern detection; supports efficient cascading.</li>
  <li><b>Design tip:</b> map MAC‑intensive loops to DSP48E2; use cascade paths for wide accumulators and FIR chains.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Best for:</b> throughput‑oriented kernels with regular, pipelinable arithmetic.</li>
  <li><b>Latency:</b> configured by pipeline registers; deeper pipelining increases Fmax at the cost of cycle latency.</li>
</ul>`;

case "BRAM":
return `
<h2>Block RAM (BRAM)</h2>
<ul>
  <li><b>Role:</b> On‑chip dual‑port SRAM for FIFOs, line buffers, scratchpads, and low‑latency shared memory.</li>
  <li><b>Granularity:</b> 36Kb blocks (RAMB36E2) that can be split into two independent 18Kb blocks; flexible port widths and optional output registers.</li>
  <li><b>Reliability/features:</b> supports built‑in FIFO options and ECC modes (device/config dependent).</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Strength:</b> predictable single‑cycle synchronous access with high aggregate bandwidth via parallel instantiation.</li>
  <li><b>Scaling:</b> cascade in width/depth for larger memories; use BRAM for mid‑sized buffers and URAM for deeper storage.</li>
</ul>`;

case "URAM":
return `
<h2>UltraRAM (URAM)</h2>
<ul>
  <li><b>Role:</b> High‑density on‑chip memory for deep buffers (e.g., feature maps, large FIFOs, replay buffers).</li>
  <li><b>Block type:</b> URAM288 resources with cascade support; includes power-gating features and ECC options.</li>
  <li><b>Design tip:</b> prefer URAM for depth and BRAM for flexible aspect ratios/very high multi-porting via replication.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Scaling:</b> excellent for deep, streaming designs where external DDR latency would stall pipelines.</li>
  <li><b>Latency:</b> synchronous with optional pipeline stages; plan pipelines to match your target Fmax.</li>
</ul>`;

case "CLOCK":
return `
<h2>Clock Network (BUFG / MMCM / PLL)</h2>
<ul>
  <li><b>Role:</b> Generates, conditions, and distributes clocks across clock regions using global/horizontal routing and clock buffers.</li>
  <li><b>Clock management:</b> Clock Management Tiles (CMTs) contain MMCMs/PLLs for frequency synthesis, deskew, jitter filtering, and optional fractional divides.</li>
  <li><b>Design tip:</b> isolate unrelated clock domains; use proper CDC synchronizers and avoid unnecessary derived clocks.</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>Quality:</b> jitter and duty-cycle distortion can dominate high-speed I/O and timing closure; use MMCM/PLL settings and constraints carefully.</li>
  <li><b>Debug:</b> confirm lock/reset behavior and clock enable strategy (BUFGCE/BUFGCTRL) early to avoid intermittent failures.</li>
</ul>`;

case "IOB":
return `
<h2>IOB / SelectIO (Programmable I/O)</h2>
<ul>
  <li><b>Role:</b> Programmable input/output resources supporting a wide range of single‑ended and differential standards.</li>
  <li><b>Configurability:</b> programmable drive strength and slew rate; on‑chip termination options; ability to generate internal reference voltages (INTERNAL_VREF) depending on bank type.</li>
  <li><b>Standards examples:</b> LVCMOS, SSTL/HSTL, LVDS, and MIPI D‑PHY (device/bank dependent).</li>
</ul>
<b>Performance:</b>
<ul>
  <li><b>High‑speed I/O building blocks:</b> access to delay, SERDES, and register resources (“bit-slices”) for source‑synchronous interfaces.</li>
  <li><b>Signal integrity:</b> board layout + termination strategy are as important as FPGA settings for reliable GHz‑class I/O.</li>
</ul>`;
}
return type;
}
/* PS */
document.querySelectorAll(".core-block,.l2,.axi-core,.node")
.forEach(el=> el.onclick=()=> info.innerHTML=desc(el.dataset.type));

/* ===== PL ROUTING (UNCHANGED) ===== */
let selected=null, connections={};
const grid=document.getElementById("grid");
const svg=document.getElementById("routes");

function getType(x,y){
 if(x===0||y===0||x===7||y===7) return "IOB";
 if(x===2) return "DSP";
 if(x===4) return "BRAM";
 if(x===5) return "URAM";
 if(x===6) return "CLOCK";
 return "CLB";
}

function edge(a,b){
 const ar=a.getBoundingClientRect();
 const br=b.getBoundingClientRect();
 const gr=grid.getBoundingClientRect();
 const size=a.offsetWidth || (ar.width||45);
 const half=size/2;
 const ax=ar.left-gr.left, ay=ar.top-gr.top;
 const cx=ax+half, cy=ay+half;
 const dx=(br.left+half)-(ar.left+half);
 const dy=(br.top+half)-(ar.top+half);
 return Math.abs(dx)>Math.abs(dy)
 ? {x:dx>0?ax+size:ax,y:cy}
 : {x:cx,y:dy>0?ay+size:ay};
}

function draw(a,b,k){
 const p1=edge(a,b), p2=edge(b,a);
 const midX=(p1.x+p2.x)/2;

 const path=`M ${p1.x} ${p1.y}
 L ${midX} ${p1.y}
 L ${midX} ${p2.y}
 L ${p2.x} ${p2.y}`;

 const el=document.createElementNS("http://www.w3.org/2000/svg","path");
 el.setAttribute("d",path);
 el.setAttribute("stroke","#38bdf8");
 el.setAttribute("stroke-width","3");
 el.setAttribute("fill","none");

 svg.appendChild(el);
 connections[k]=el;
}

function remove(k){
 if(!connections[k]) return;
 svg.removeChild(connections[k]);
 delete connections[k];
}

function key(a,b){
 return a.dataset.id < b.dataset.id
 ? a.dataset.id+"-"+b.dataset.id
 : b.dataset.id+"-"+a.dataset.id;
}

for(let y=0;y<8;y++){
 for(let x=0;x<8;x++){
  const t=document.createElement("div");
  const type=getType(x,y);

  t.className=`tile ${type.toLowerCase()}`;
  t.innerText=type;
  t.dataset.id=`pl-${x}-${y}`;

  t.onclick=(e)=>{
   if(e.shiftKey && selected && selected!==t){
     const k=key(selected,t);
     if(connections[k]) remove(k);
     else draw(selected,t,k);
     selected=null;
     return;
   }
   selected=t;
   info.innerHTML=desc(type);
  };

  grid.appendChild(t);
}}
</script>

</body>
</html>
