<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.5">
<title>UltraScale+ MPSoC Performance Explorer</title>

<style>
body {
 font-family: Arial;
 background:#0f172a;
 color:#e2e8f0;
 display:flex;
 gap:20px;
 padding:20px;
}
#container { display:flex;}

#ps { width:480px; border-right:3px solid #334155;}

.ps-section {
 display:grid;
 grid-template-columns: repeat(2,1fr);
 gap:12px;
 padding:10px;
}

.core-block {
 background:rgba(244,63,94,0.2);
 border:1px solid #f43f5e;
 border-radius:6px;
 padding:6px;
 text-align:center;
 cursor:pointer;
 font-size:12px;
}

.cache-row{
 display:flex;
 gap:4px;
 justify-content:center;
 margin-top:4px;
}

.cache{
 font-size:9px;
 padding:2px 4px;
 border-radius:3px;
 background:rgba(255,255,255,0.1);
}

.l2 {
 margin:10px;
 padding:10px;
 border:2px solid #f97316;
 text-align:center;
 border-radius:6px;
 cursor:pointer;
}

.axi-area {
 position:relative;
 height:300px;
}

.axi-core {
 position:absolute;
 left:170px;
 top:20px;
 width:140px;
 height:70px;
 border:2px solid #38bdf8;
 border-radius:8px;
 background:rgba(56,189,248,0.1);
 text-align:center;
 line-height:70px;
 cursor:pointer;
}

.node {
 position:absolute;
 width:130px;
 padding:8px;
 border-radius:6px;
 background:rgba(255,255,255,0.05);
 border:1px solid #94a3b8;
 text-align:center;
 cursor:pointer;
 font-size:11px;
}

#ddr { left:10px; top:130px;}
#periph { right:10px; top:130px;}

#gp { left:10px; bottom:10px;}
#hp { left:175px; bottom:10px;}
#hpc { right:10px; bottom:10px;}

.line { position:absolute; background:#38bdf8;}
.v { width:2px;}
.h { height:2px;}

#pl { position:relative;}

#grid {
 display:grid;
 grid-template-columns: repeat(8,60px);
 gap:25px;
}

#routes {
 position:absolute;
 width:900px;height:900px;
 pointer-events:none;
}

.tile {
 width:60px;
 height:60px;
 display:flex;
 align-items:center;
 justify-content:center;
 border-radius:6px;
 border:1px solid rgba(255,255,255,0.2);
 background:rgba(255,255,255,0.05);
 cursor:pointer;
 font-size:10px;
}

.clb{box-shadow: inset 0 0 6px #3b82f6;}
.dsp{box-shadow: inset 0 0 6px #ec4899;}
.bram{box-shadow: inset 0 0 6px #f59e0b;}
.uram{box-shadow: inset 0 0 6px #7c3aed;}
.clock{box-shadow: inset 0 0 6px #22d3ee;}
.iob{box-shadow: inset 0 0 6px #10b981;}

#info {
 width:430px;
 background:#020617;
 padding:15px;
 border-radius:8px;
 overflow:auto;
 max-height:90vh;
}
</style>
</head>

<body>

<div id="container">

<!-- ===== PS ===== -->
<div id="ps">

<div class="ps-section">
<div class="core-block" data-type="CORE">Core0<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
<div class="core-block" data-type="CORE">Core1<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
<div class="core-block" data-type="CORE">Core2<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
<div class="core-block" data-type="CORE">Core3<div class="cache-row"><div class="cache">L1I</div><div class="cache">L1D</div></div></div>
</div>

<div class="l2" data-type="L2">L2 Cache + SCU</div>

<div class="axi-area">
<div class="axi-core" data-type="AXI">AXI Interconnect</div>

<div id="ddr" class="node" data-type="DDR">DDR</div>
<div id="periph" class="node" data-type="PERIPH">Peripherals</div>
<div id="gp" class="node" data-type="GP">AXI-GP</div>
<div id="hp" class="node" data-type="HP">AXI-HP</div>
<div id="hpc" class="node" data-type="HPC">AXI-HPC</div>

<!-- wiring -->
<div class="line v" style="left:240px; top:-30px; height:50px;"></div>
<div class="line h" style="left:60px; top:95px; width:360px;"></div>
<div class="line v" style="left:60px; top:95px; height:170px;"></div>
<div class="line v" style="left:240px; top:95px; height:170px;"></div>
<div class="line v" style="left:420px; top:95px; height:170px;"></div>

</div>
</div>

<!-- ===== PL ===== -->
<div id="pl">
<svg id="routes"></svg>
<div id="grid"></div>
</div>

</div>

<div id="info">Click component</div>

<script>
const info=document.getElementById("info");

/* ===== FULL TECH + PERFORMANCE ===== */
function desc(type){

switch(type){

case "CORE":
return `<h2>Cortex-A53 Core</h2>
<ul>
<li>Dual-issue in-order ARMv8-A core</li>
<li>L1I/L1D: 32KB each</li>
<li>NEON SIMD + FPU</li>
</ul>
<b>Performance:</b>
<ul>
<li>Frequency: ~1.2–1.5 GHz</li>
<li>Latency (L1 hit): ~1–3 cycles</li>
<li>IPC: ~2 max</li>
</ul>`;

case "L2":
return `<h2>L2 Cache + SCU</h2>
<ul>
<li>Shared coherent cache</li>
<li>Maintains MESI protocol</li>
</ul>
<b>Performance:</b>
<ul>
<li>Size: 512KB–2MB</li>
<li>Latency: ~10–20 cycles</li>
<li>Bandwidth: ~20–40 GB/s internal</li>
</ul>`;

case "AXI":
return `<h2>AXI Interconnect</h2>
<ul>
<li>AXI4 with burst support</li>
<li>Multiple masters/slaves</li>
</ul>
<b>Performance:</b>
<ul>
<li>Bandwidth: up to ~15 GB/s</li>
<li>Latency: 10–50 ns (no DDR)</li>
</ul>`;

case "DDR":
return `<h2>DDR Controller</h2>
<ul>
<li>Main external memory</li>
</ul>
<b>Performance:</b>
<ul>
<li>Bandwidth: 4–20 GB/s</li>
<li>Latency: 50–120 ns</li>
</ul>`;

case "GP":
return `<h2>AXI-GP</h2>
<ul>
<li>Control interface</li>
</ul>
<b>Performance:</b>
<ul>
<li>Bandwidth: <1 GB/s</li>
<li>Latency: low (~50ns)</li>
</ul>`;

case "HP":
return `<h2>AXI-HP</h2>
<ul>
<li>High throughput data path</li>
</ul>
<b>Performance:</b>
<ul>
<li>Bandwidth: 6–12 GB/s</li>
<li>Latency: ~100 ns</li>
</ul>`;

case "HPC":
return `<h2>AXI-HPC</h2>
<ul>
<li>Cache-coherent PL access</li>
</ul>
<b>Performance:</b>
<ul>
<li>Bandwidth: ~5–10 GB/s</li>
<li>Latency: 150–300 ns</li>
</ul>`;

case "CLB":
return `<h2>CLB</h2>
<ul>
<li>LUT6 + FF + carry chain</li>
</ul>
<b>Performance:</b>
<ul>
<li>Delay: ~100–300 ps</li>
<li>Freq: 300–600 MHz</li>
</ul>`;

case "DSP":
return `<h2>DSP48</h2>
<ul>
<li>MAC unit</li>
</ul>
<b>Performance:</b>
<ul>
<li>Freq: up to 600 MHz</li>
<li>Latency: 3–5 cycles</li>
</ul>`;

case "BRAM":
return `<h2>BRAM</h2>
<ul>
<li>Dual-port memory</li>
</ul>
<b>Performance:</b>
<ul>
<li>Latency: 1–2 cycles</li>
<li>Bandwidth: high (parallel)</li>
</ul>`;

case "URAM":
return `<h2>URAM</h2>
<ul>
<li>High-density memory</li>
</ul>
<b>Performance:</b>
<ul>
<li>Latency: 2–4 cycles</li>
</ul>`;

case "CLOCK":
return `<h2>Clock Network</h2>
<ul>
<li>PLL/MMCM</li>
</ul>
<b>Performance:</b>
<ul>
<li>Jitter: low (<50 ps)</li>
</ul>`;

case "IOB":
return `<h2>IOB</h2>
<ul>
<li>External interface</li>
</ul>
<b>Performance:</b>
<ul>
<li>Supports GHz-level I/O</li>
</ul>`;
}

return type;
}

/* PS */
document.querySelectorAll(".core-block,.l2,.axi-core,.node")
.forEach(el=> el.onclick=()=> info.innerHTML=desc(el.dataset.type));

/* ===== PL ROUTING (UNCHANGED) ===== */
let selected=null, connections={};
const grid=document.getElementById("grid");
const svg=document.getElementById("routes");

function getType(x,y){
 if(x===0||y===0||x===7||y===7) return "IOB";
 if(x===2) return "DSP";
 if(x===4) return "BRAM";
 if(x===5) return "URAM";
 if(x===6) return "CLOCK";
 return "CLB";
}

function edge(a,b){
 const ar=a.getBoundingClientRect();
 const br=b.getBoundingClientRect();
 const gr=grid.getBoundingClientRect();
 const ax=ar.left-gr.left, ay=ar.top-gr.top;
 const cx=ax+30, cy=ay+30;

 const dx=(br.left+30)-(ar.left+30);
 const dy=(br.top+30)-(ar.top+30);

 return Math.abs(dx)>Math.abs(dy)
 ? {x:dx>0?ax+60:ax,y:cy}
 : {x:cx,y:dy>0?ay+60:ay};
}

function draw(a,b,k){
 const p1=edge(a,b), p2=edge(b,a);
 const midX=(p1.x+p2.x)/2;

 const path=`M ${p1.x} ${p1.y}
 L ${midX} ${p1.y}
 L ${midX} ${p2.y}
 L ${p2.x} ${p2.y}`;

 const el=document.createElementNS("http://www.w3.org/2000/svg","path");
 el.setAttribute("d",path);
 el.setAttribute("stroke","#38bdf8");
 el.setAttribute("stroke-width","3");
 el.setAttribute("fill","none");

 svg.appendChild(el);
 connections[k]=el;
}

function remove(k){
 if(!connections[k]) return;
 svg.removeChild(connections[k]);
 delete connections[k];
}

function key(a,b){
 return a.dataset.id < b.dataset.id
 ? a.dataset.id+"-"+b.dataset.id
 : b.dataset.id+"-"+a.dataset.id;
}

for(let y=0;y<8;y++){
 for(let x=0;x<8;x++){
  const t=document.createElement("div");
  const type=getType(x,y);

  t.className=`tile ${type.toLowerCase()}`;
  t.innerText=type;
  t.dataset.id=`pl-${x}-${y}`;

  t.onclick=(e)=>{
   if(e.shiftKey && selected && selected!==t){
     const k=key(selected,t);
     if(connections[k]) remove(k);
     else draw(selected,t,k);
     selected=null;
     return;
   }
   selected=t;
   info.innerHTML=desc(type);
  };

  grid.appendChild(t);
}}
</script>

</body>
</html>
